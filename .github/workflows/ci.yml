name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  rust-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev
      - name: Prepare sidecar binaries
        run: node ../scripts/prepare_sidecar.mjs
      - run: cargo check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    needs: [frontend-build, rust-check]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- --retries=2
      - run: npm run test:e2e:contract
      - name: Prepare sidecar binaries
        run: node scripts/prepare_sidecar.mjs
      - run: cargo test
        working-directory: src-tauri
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-debug-artifacts
          path: |
            playwright-report/**
            test-results/**
          if-no-files-found: ignore

  tauri-runtime-smoke:
    runs-on: macos-latest
    timeout-minutes: 45
    needs: [test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run test:tauri:smoke
        env:
          DASHDROP_SMOKE_ARTIFACT_DIR: test-results/tauri-runtime-smoke
      - run: npm run test:tauri:daemon-smoke
        env:
          DASHDROP_SMOKE_ARTIFACT_DIR: test-results/tauri-daemon-smoke
      - name: Upload Tauri smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-smoke-debug-artifacts
          path: |
            test-results/tauri-runtime-smoke/**
            test-results/tauri-daemon-smoke/**
          if-no-files-found: ignore

  tauri-bundle-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-latest
    timeout-minutes: 60
    needs: [tauri-runtime-smoke]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run test:tauri:bundle-smoke
        env:
          DASHDROP_SMOKE_ARTIFACT_DIR: test-results/tauri-bundle-smoke
      - name: Upload Tauri bundle smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundle-smoke-debug-artifacts
          path: test-results/tauri-bundle-smoke/**
          if-no-files-found: ignore
